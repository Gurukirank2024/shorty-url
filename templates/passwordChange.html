{% extends 'nav.html' %}

{% block content %}
<div class="container-fluid">
  <div class="row">
    <div class="col-6 col-sm-6 col-md-5 col-lg-4 mx-auto">
      <div class="card shadow-sm rounded login-card">
        <div class="card-body">
          <h3 class="text-center">Change Password</h3>
          <br>

          {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-{{msg.tags}} alert-dismissible fade show" role="alert">
              {{msg}}
              <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            {% endfor %}
          {% endif %}
          {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{ error }}
              <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
          {% endif %}

          <form action="{% url 'passwordChange' %}" method="POST">
            {% csrf_token %}
            <div class="form-group">
              <input type="password" class="form-control text-dark" name="oldPassword" placeholder="Old Password" required>
            </div>
            <div class="form-group">
              <input type="password" class="form-control text-dark" name="newPassword" placeholder="New Password" required>
            </div>
            <div class="form-group">
              <input type="password" class="form-control text-dark" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            <div class="form-group text-center">
              <input type="submit" class="btn btn-outline-warning px-4" value="Change Password">
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .login-card {
    transition: all 0.3s ease-in-out;
    border-radius: 12px;
  }
  .login-card:hover {
    background-color: lavender;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    animation: bounce 0.6s;
  }
  .form-control.text-dark {
    color: black;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
</style>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
  integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
  crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
  integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
  crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
  integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
  crossorigin="anonymous"></script>
</body>
</html>
{% endblock %}
